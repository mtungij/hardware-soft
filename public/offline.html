<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0F172A">
    <title>Hardex Offline</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #ffffff;
            color: #0f172a;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .card {
            width: min(92vw, 420px);
            padding: 28px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 24px 60px -36px rgba(15, 23, 42, .55);
        }
        img { width: 84px; height: 84px; object-fit: contain; }
        h1 { margin: 18px 0 8px; font-size: 24px; }
        p { margin: 0; color: #64748b; line-height: 1.6; }
        @media (prefers-color-scheme: dark) {
            body { background: #020617; color: #f8fafc; }
            .card { border-color: #1e293b; background: #0f172a; }
            p { color: #cbd5e1; }
        }
    </style>
</head>
<body>
    <main class="card">
        <img src="/icons/icon-192x192.png" alt="Hardex">
        <h1>Hardex is offline</h1>
        <p>Your connection is unavailable. Reconnect to continue using live inventory, POS, accounting, and reports.</p>
    </main>
</body>
</html>
